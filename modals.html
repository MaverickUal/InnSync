
<div class="modal fade" id="loginModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Login</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<form id="loginForm">

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" id="loginEmail">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" id="loginPassword">
</div>

<p id="loginError" class="error"></p>

<button type="submit" id="loginBtn" class="btn btn-dark w-100" disabled>
Login
</button>

</form>

</div>
</div>
</div>
</div>


<div class="modal fade" id="registerModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Register</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<form id="registerForm">

<div class="mb-3">
<label>First Name</label>
<input type="text" class="form-control" id="fname">
<p id="nameError" class="text-danger"></p>
</div>

<div class="mb-3">
<label>M.I</label>
<input type="text" class="form-control" id="mi">
</div>

<div class="mb-3">
<label>Last Name</label>
<input type="text" class="form-control" id="lname">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" id="email">
<p id="emailError" class="text-danger"></p>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" id="password">
<p id="passwordError" class="text-danger"></p>
</div>

<div class="mb-3">
<label>Confirm Password</label>
<input type="password" class="form-control" id="confirmPassword">
<p id="confirmPasswordError" class="text-danger"></p>
</div>

<p id="successMessage" class="text-success"></p>

<button type="submit" class="btn btn-dark w-100" id="registerBtn" disabled>
Register
</button>

</form>

</div>
</div>
</div>
</div>
